<script>
    // Problem 4 – Food Preferences (Pizza & Chinese)

    // Ask the user two Yes/No questions
    let likesPizza = confirm("Do you like pizza? Click OK for Yes, Cancel for No.");
    let likesChinese = confirm("Do you like Chinese food? Click OK for Yes, Cancel for No.");

    // Decision logic for all combinations
    if (likesPizza && likesChinese) {
        alert("You love delicious things!");
    } else if (likesPizza || likesChinese) {
        alert("You have good taste!");
    } else {
        alert("Maybe you'll find something you like someday!");
    }
</script>
